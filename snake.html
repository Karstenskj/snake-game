<!DOCTYPE html>
<html>
<head><title>Snake</title></head>
<body style="background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;color:#fff;font-family:monospace">
<div id="score">Score: 0</div>
<canvas id="c" width="400" height="400" style="border:1px solid #fff;margin-top:10px"></canvas>
<div style="margin-top:10px;font-size:12px">Arrow keys to move</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),S=20,W=20;
let snake=[{x:10,y:10}],dir={x:1,y:0},food={},score=0,running=true;

function rnd(){return Math.floor(Math.random()*W)}
function newFood(){food={x:rnd(),y:rnd()}}
newFood();

document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k==='ArrowUp'&&dir.y===0)dir={x:0,y:-1};
  if(k==='ArrowDown'&&dir.y===0)dir={x:0,y:1};
  if(k==='ArrowLeft'&&dir.x===0)dir={x:-1,y:0};
  if(k==='ArrowRight'&&dir.x===0)dir={x:1,y:0};
});

function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,400,400);
  ctx.fillStyle='#f00';
  ctx.fillRect(food.x*S,food.y*S,S-1,S-1);
  ctx.fillStyle='#0f0';
  snake.forEach(p=>ctx.fillRect(p.x*S,p.y*S,S-1,S-1));
}

function update(){
  if(!running)return;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=W||head.y<0||head.y>=W||snake.some(p=>p.x===head.x&&p.y===head.y)){
    ctx.fillStyle='#fff';
    ctx.font='30px monospace';
    ctx.fillText('Game Over',110,200);
    running=false;return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score++;document.getElementById('score').textContent='Score: '+score;newFood();}
  else snake.pop();
  draw();
}

draw();
setInterval(update,150);
</script>
</body>
</html>
