<!DOCTYPE html>
<html>
<head>
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center;
         justify-content: center; height: 100vh; color: #fff; font-family: monospace; }
  #score { font-size: 20px; margin-bottom: 12px; letter-spacing: 2px; }
  canvas { border: 2px solid #333; border-radius: 4px; }
  #msg { margin-top: 12px; font-size: 13px; color: #888; height: 18px; }
</style>
</head>
<body>
<div id="score">SCORE: 0</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">Tryk Enter for at starte</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 20, ROWS = 20, CELL = 20;

let snake, dir, nextDir, food, score, state, interval;

function init() {
  snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  state = 'playing';
  document.getElementById('score').textContent = 'SCORE: 0';
  document.getElementById('msg').textContent = '';
  spawnFood();
  clearInterval(interval);
  interval = setInterval(tick, 130);
}

function spawnFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && state !== 'playing') { init(); return; }
  if (state !== 'playing') return;
  if (e.key === 'ArrowUp'    && dir.y === 0) nextDir = {x:0, y:-1};
  if (e.key === 'ArrowDown'  && dir.y === 0) nextDir = {x:0, y:1};
  if (e.key === 'ArrowLeft'  && dir.x === 0) nextDir = {x:-1, y:0};
  if (e.key === 'ArrowRight' && dir.x === 0) nextDir = {x:1, y:0};
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    state = 'over';
    clearInterval(interval);
    drawGame();
    drawOverlay('GAME OVER', `Score: ${score}`, 'Tryk Enter for at prøve igen');
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = 'SCORE: ' + score;
    spawnFood();
  } else {
    snake.pop();
  }
  drawGame();
}

function drawGame() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, 400, 400);

  // Grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,400); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(400,i*CELL); ctx.stroke();
  }

  // Food
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    const t = 1 - i / snake.length;
    ctx.fillStyle = `hsl(120, 70%, ${20 + t*35}%)`;
    ctx.fillRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2);
  });

  // Eyes on head
  const h = snake[0];
  ctx.fillStyle = '#fff';
  const ex = dir.x, ey = dir.y;
  const cx = h.x*CELL+CELL/2, cy = h.y*CELL+CELL/2;
  const ox = ey*4, oy = ex*4;
  ctx.beginPath(); ctx.arc(cx+ex*4+ox, cy+ey*4+oy, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+ex*4-ox, cy+ey*4-oy, 2, 0, Math.PI*2); ctx.fill();
}

function drawOverlay(title, sub, hint) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 400, 400);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px monospace';
  ctx.fillText(title, 200, 175);
  ctx.font = '20px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(sub, 200, 215);
  ctx.font = '13px monospace';
  ctx.fillStyle = '#666';
  ctx.fillText(hint, 200, 250);
  ctx.textAlign = 'left';
}

// Start screen
ctx.fillStyle = '#111';
ctx.fillRect(0,0,400,400);
drawOverlay('SNAKE', '', 'Tryk Enter for at starte');
</script>
</body>
</html>
